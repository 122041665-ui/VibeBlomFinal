version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vibebloom_app
    working_dir: /var/www
    volumes:
      - ..:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vibebloom

  nginx:
    image: nginx:alpine
    container_name: vibebloom_nginx
    ports:
      - "8000:80"
    volumes:
      - ..:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - vibebloom

networks:
  vibebloom:
    driver: bridge